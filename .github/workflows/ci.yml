name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-structure:
    name: Validate structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check required files
        run: |
          for f in skills/michael-polanyi/SKILL.md skills/michael-polanyi/examples.md skills/michael-polanyi/polanyi-notes.md; do
            test -f "$f" && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done

      - name: Validate frontmatter
        run: |
          python3 - <<'PY'
          import re
          import sys
          from pathlib import Path

          skill_path = Path("skills/michael-polanyi/SKILL.md")
          text = skill_path.read_text(encoding="utf-8")

          if not text.startswith("---\n"):
              print("FAIL: frontmatter must start with ---")
              sys.exit(1)

          parts = text.split("---", 2)
          if len(parts) < 3:
              print("FAIL: frontmatter is not properly closed")
              sys.exit(1)

          frontmatter = parts[1]
          name_match = re.search(r"^name:\s*(.+)$", frontmatter, re.MULTILINE)
          description_match = re.search(r"^description:\s*(.+)$", frontmatter, re.MULTILINE)

          if not name_match:
              print("FAIL: missing name field")
              sys.exit(1)
          if not description_match or not description_match.group(1).strip().strip('"').strip("'"):
              print("FAIL: missing or empty description field")
              sys.exit(1)

          expected_slug = skill_path.parent.name
          actual_name = name_match.group(1).strip().strip('"').strip("'")
          if actual_name != expected_slug:
              print(f"FAIL: skill directory slug '{expected_slug}' does not match frontmatter name '{actual_name}'")
              sys.exit(1)

          print("OK: frontmatter valid")
          PY

  lint-markdown:
    name: Lint markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check frontmatter
        run: |
          errors=0
          for f in $(find skills/michael-polanyi -name "*.md" -type f); do
            if head -1 "$f" | grep -q "^---"; then
              count=$(head -n 20 "$f" | tail -n +2 | grep -c "^---")
              if [ "$count" -eq 0 ]; then
                echo "FAIL: unclosed frontmatter in $f"; errors=$((errors + 1))
              fi
            fi
          done
          test $errors -eq 0 && echo "OK: all markdown valid" || exit 1

  validate-evals:
    name: Validate evals
    runs-on: ubuntu-latest
    needs: validate-structure
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check eval files
        run: |
          for f in evals.json prompts.md rubric.md protocol.md; do
            test -f "workbench/evals/$f" && echo "OK: $f" || { echo "FAIL: $f missing"; exit 1; }
          done
          test -d "workbench/evals/fixtures" && echo "OK: fixtures/" || { echo "FAIL: fixtures/ missing"; exit 1; }

      - name: Validate evals.json
        run: |
          python3 - <<'PY'
          import json, sys
          with open('workbench/evals/evals.json') as f:
              d = json.load(f)
          evals = d.get('evals', [])
          print(f'OK: {len(evals)} evals found')
          for i, e in enumerate(evals):
              for k in ['id', 'eval_name', 'prompt', 'assertions', 'files']:
                  if k not in e:
                      print(f'FAIL: eval {i} missing {k}')
                      sys.exit(1)
          print('OK: all evals valid')
          PY

      - name: Run fixture suite
        run: |
          python3 workbench/scripts/check_assertions.py --suite --output workbench/evals/results/latest.json

  code-quality:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install flake8 black

      - name: Check Python syntax
        run: |
          shopt -s nullglob
          for f in skills/michael-polanyi/scripts/*.py workbench/scripts/*.py workbench/eval-viewer/*.py; do
            python3 -m py_compile "$f" && echo "OK: $f" || echo "FAIL: $f"
          done

      - name: Run flake8
        run: |
          if [ -d "skills/michael-polanyi/scripts" ]; then
            flake8 skills/michael-polanyi/scripts/ --max-line-length=120 --ignore=E501,W503 || echo "WARN: flake8 issues"
          fi

  content-quality:
    name: Content quality
    runs-on: ubuntu-latest
    needs: validate-structure
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check SKILL.md length
        run: |
          lines=$(wc -l < skills/michael-polanyi/SKILL.md)
          echo "SKILL.md: $lines lines"
          test $lines -le 200 && echo "OK: length reasonable" || echo "WARN: consider simplifying"

      - name: Check examples balance
        run: |
          generic=$(grep -c "^### Generic answer$" skills/michael-polanyi/examples.md || true)
          practitioner=$(grep -c "^### Practitioner answer$" skills/michael-polanyi/examples.md || true)
          echo "Generic: $generic, Practitioner: $practitioner"
          if [ "$generic" -eq 0 ] || [ "$practitioner" -eq 0 ]; then
            echo "FAIL: example sections must be non-zero"
            exit 1
          fi
          if [ "$generic" -ne "$practitioner" ]; then
            echo "FAIL: examples are unbalanced"
            exit 1
          fi
          echo "OK: balanced"

      - name: Run fluff detection
        run: |
          if [ -f "skills/michael-polanyi/scripts/detect_fluff.py" ]; then
            python3 skills/michael-polanyi/scripts/detect_fluff.py skills/michael-polanyi/examples.md || echo "INFO: fluff detected"
          fi
          echo "OK: content check complete"

  generate-report:
    name: Generate report
    runs-on: ubuntu-latest
    needs: [validate-evals, content-quality, code-quality, lint-markdown]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate suite results
        run: |
          python3 workbench/scripts/check_assertions.py --suite --output workbench/evals/results/latest.json

      - name: Generate HTML review
        run: |
          python3 workbench/eval-viewer/generate_review.py \
            --evals workbench/evals/evals.json \
            --results workbench/evals/results/latest.json \
            --output workbench/evals/results/review.html

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: eval-review
          path: |
            workbench/evals/results/latest.json
            workbench/evals/results/review.html
          if-no-files-found: error
