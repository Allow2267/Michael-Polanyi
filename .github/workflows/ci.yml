name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SKILL_PATH: skills/michael-polanyi

jobs:
  validate-structure:
    name: Validate skill structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md exists
        run: |
          if [ -f "skills/michael-polanyi/SKILL.md" ]; then
            echo "✓ SKILL.md found"
          else
            echo "✗ SKILL.md missing"
            exit 1
          fi

      - name: Validate frontmatter
        run: |
          if grep -q "^---" skills/michael-polanyi/SKILL.md && grep -q "^name:" skills/michael-polanyi/SKILL.md; then
            echo "✓ Frontmatter valid"
          else
            echo "✗ Frontmatter invalid"
            exit 1
          fi

      - name: Check required files
        run: |
          for file in "skills/michael-polanyi/SKILL.md" "skills/michael-polanyi/polanyi-notes.md" "skills/michael-polanyi/examples.md"; do
            if [ -f "$file" ]; then
              echo "✓ $file exists"
            else
              echo "✗ $file missing"
              exit 1
            fi
          done

  markdown-lint:
    name: Lint markdown files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown syntax
        run: |
          errors=0
          for file in $(find skills/michael-polanyi -name "*.md" -type f); do
            if head -1 "$file" | grep -q "^---"; then
              count=$(head -n 20 "$file" | tail -n +2 | grep -c "^---")
              if [ "$count" -eq 0 ]; then
                echo "✗ $file has unclosed frontmatter"
                errors=$((errors + 1))
              fi
            fi
          done
          if [ $errors -eq 0 ]; then
            echo "✓ All markdown files passed syntax check"
          else
            echo "✗ Found $errors markdown errors"
            exit 1
          fi

  validate-evals:
    name: Validate eval configuration
    runs-on: ubuntu-latest
    needs: validate-structure
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify eval files exist
        run: |
          for file in "evals.json" "prompts.md" "rubric.md" "protocol.md"; do
            if [ -f "skills/michael-polanyi/evals/$file" ]; then
              echo "✓ evals/$file exists"
            else
              echo "⚠ evals/$file missing (optional)"
            fi
          done

      - name: Validate evals.json
        run: |
          python3 << 'PYEOF'
import json
import sys

try:
    with open('skills/michael-polanyi/evals/evals.json') as f:
        data = json.load(f)
    print("✓ evals.json is valid JSON")
except Exception as e:
    print(f"✗ Failed to parse evals.json: {e}")
    sys.exit(1)

evals = data.get('evals', [])
errors = []

for i, e in enumerate(evals):
    if 'id' not in e:
        errors.append(f"Eval {i}: missing 'id'")
    if 'eval_name' not in e:
        errors.append(f"Eval {i}: missing 'eval_name'")
    if 'prompt' not in e:
        errors.append(f"Eval {i}: missing 'prompt'")
    if 'assertions' not in e or len(e.get('assertions', [])) == 0:
        errors.append(f"Eval {i}: missing or empty 'assertions'")

if errors:
    for e in errors:
        print(f"✗ {e}")
    sys.exit(1)
else:
    print(f"✓ All {len(evals)} evals have required fields")
PYEOF

  code-quality:
    name: Python code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install flake8 black

      - name: Check Python syntax
        run: |
          for file in skills/michael-polanyi/scripts/*.py skills/michael-polanyi/eval-viewer/*.py 2>/dev/null; do
            if [ -f "$file" ]; then
              python3 -m py_compile "$file" && echo "✓ $file syntax OK" || echo "✗ $file failed"
            fi
          done

      - name: Run flake8
        run: |
          if [ -d "skills/michael-polanyi/scripts" ]; then
            flake8 skills/michael-polanyi/scripts/ --max-line-length=120 --ignore=E501,W503 || echo "Flake8 warnings (non-fatal)"
          fi

  content-quality:
    name: Content quality checks
    runs-on: ubuntu-latest
    needs: validate-structure
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check SKILL.md length
        run: |
          lines=$(wc -l < skills/michael-polanyi/SKILL.md)
          echo "SKILL.md has $lines lines"
          if [ "$lines" -gt 200 ]; then
            echo "⚠ SKILL.md is long (>200 lines)"
          else
            echo "✓ SKILL.md length is reasonable"
          fi

      - name: Check examples balance
        run: |
          before=$(grep -c "## Before" skills/michael-polanyi/examples.md || echo 0)
          after=$(grep -c "## After" skills/michael-polanyi/examples.md || echo 0)
          echo "Found $before Before / $after After sections"
          if [ "$before" -eq "$after" ] && [ "$before" -gt 0 ]; then
            echo "✓ examples.md has balanced pairs"
          fi

      - name: Run fluff detection
        run: |
          if [ -f "skills/michael-polanyi/scripts/detect_fluff.py" ]; then
            python3 skills/michael-polanyi/scripts/detect_fluff.py skills/michael-polanyi/examples.md || echo "Fluff detected (expected in examples)"
          fi
          echo "✓ Content quality check complete"

  generate-report:
    name: Generate eval report
    runs-on: ubuntu-latest
    needs: validate-evals
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate HTML review
        run: |
          cd skills/michael-polanyi/eval-viewer
          if [ -f "generate_review.py" ] && [ -f "../evals/evals.json" ]; then
            python3 generate_review.py
            echo "✓ Generated review.html"
          else
            echo "⚠ Skipped (missing files)"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-review
          path: skills/michael-polanyi/eval-viewer/review.html
          if-no-files-found: ignore
