name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md
        run: |
          if [ -f "skills/michael-polanyi/SKILL.md" ]; then
            echo "OK: SKILL.md exists"
          else
            echo "FAIL: SKILL.md missing"
            exit 1
          fi

      - name: Check examples.md
        run: |
          if [ -f "skills/michael-polanyi/examples.md" ]; then
            echo "OK: examples.md exists"
          else
            echo "FAIL: examples.md missing"
            exit 1
          fi

      - name: Check evals.json
        run: |
          if [ -f "skills/michael-polanyi/evals/evals.json" ]; then
            echo "OK: evals.json exists"
          else
            echo "FAIL: evals.json missing"
            exit 1
          fi

      - name: Validate evals.json syntax
        run: |
          python3 << 'EOF'
import json
import sys

try:
    with open('skills/michael-polanyi/evals/evals.json') as f:
        data = json.load(f)
    print("OK: evals.json is valid JSON")
except Exception as e:
    print(f"FAIL: {e}")
    sys.exit(1)

evals = data.get('evals', [])
if not evals:
    print("FAIL: no evals found")
    sys.exit(1)

print(f"OK: {len(evals)} evals found")
EOF
